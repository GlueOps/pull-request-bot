name: 'Remove old GHCR.io Images'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cleanup-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Cleanup old images
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          package: pull-request-bot
          exclude-tags: latest,main,v*
          keep-n-tagged: 5
          delete-untagged: true
          delete-partial-images: true
          older-than: 5 days
